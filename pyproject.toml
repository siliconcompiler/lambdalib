[build-system]
requires = [
    "setuptools >= 80",
    "setuptools_scm[toml] >= 8"
]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
# Presence of this section activates setuptools_scm, even though it's empty
write_to = "lambdalib/_version.py"
write_to_template = '''
# This file is automatically generated by setuptools_scm.
# Do not edit it directly.

__version__ = "{version}"
__base_version__ = "{scm_version.tag}"
'''

[tool.setuptools]
include-package-data = true
packages = ["lambdalib"]

[project]
name = "lambdalib"
authors = [{name = "Zero ASIC"}]
description = "Standardized ASIC design libraries"
readme = "README.md"
urls = {Homepage = "https://github.com/siliconcompiler/lambdalib"}
requires-python = ">= 3.9"
license = "MIT"
license-files = ["LICENSE"]
dependencies = [
    "siliconcompiler >= 0.37.0",
    "Jinja2 >= 3.1.3"
]
dynamic = ['version']

[project.optional-dependencies]
# Dev dependencies.
test = [
    "pytest == 9.0.2",
    "pytest-xdist==3.8.0",
    "pytest-timeout == 2.4.0",
    "cocotb == 2.0.1",
    "cocotb-bus == 0.3.0"
]
cocotb = [
    "cocotb == 2.0.1",
    "cocotb-bus == 0.3.0"
]

lint = [
    "flake8 == 7.3.0",
    "codespell == 2.4.2"
]

[tool.pytest.ini_options]
markers = [
    "eda: this test requires EDA tools installed to run.",
]
pythonpath = [
    "tests"
]
testpaths = [
    "tests"
]
timeout = "60"

[tool.codespell]
count = true
quiet-level = 3
ignore-words-list = 'inout,inouts,nin,te,dout'
